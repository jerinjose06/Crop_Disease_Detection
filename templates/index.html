<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SustainaCrop - AI Plant Disease Detection</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="app-container">
        
        <!-- Main Glassmorphism Card -->
        <main class="glass-card main-card">
            
            <header class="app-header">
                <div class="logo">
                    <svg class="leaf-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
                        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                    </svg>
                    <h1>SustainaCrop</h1>
                </div>
                <p class="subtitle">Upload a plant leaf image for instant AI diagnosis and actionable remedies.</p>
            </header>

            <!-- File Upload Section -->
            <section class="upload-section active-section" id="uploadSection">
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="imageInput" accept="image/*" class="hidden-input">
                    <div class="upload-content" id="uploadContent">
                        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <h3>Drag & Drop leaf image</h3>
                        <p>or</p>
                        <button class="btn-primary" id="browseBtn">Browse Files</button>
                    </div>
                </div>
                <!-- Image Preview Area -->
                <div class="preview-container hidden" id="previewContainer">
                    <div class="image-wrapper">
                        <img id="imagePreview" src="" alt="Selected leaf">
                    </div>
                    <div class="preview-actions">
                        <button class="btn-secondary" id="removeBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            Remove
                        </button>
                        <button class="btn-primary" id="analyzeBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            Analyze Image
                        </button>
                    </div>
                </div>
            </section>

            <!-- Loading Spinner Section -->
            <section class="loading-section hidden" id="loadingSection">
                <div class="scanner-container">
                    <div class="leaf-silhouette">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
                            <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                        </svg>
                    </div>
                    <div class="scanner-line"></div>
                </div>
                <p class="loading-text">AI is analyzing the leaf patterns...</p>
            </section>

            <!-- Results Section -->
            <section class="results-section hidden" id="resultsSection">
                
                <div class="result-header">
                    <div class="status-badge" id="healthStatusBadge">
                        <span class="pulse-dot" id="pulseDot"></span> 
                        <span id="healthStatusText">Scanning...</span>
                    </div>
                </div>
                
                <div class="prediction-main">
                    <div class="titles">
                        <h2 id="plantName">Plant Name</h2>
                        <h3 id="diseaseName">Disease Name</h3>
                    </div>
                    <div class="confidence-bar-container">
                        <div class="confidence-label">
                            <span>AI Confidence</span>
                            <span id="confidenceVal">0%</span>
                        </div>
                        <div class="confidence-track">
                            <div class="confidence-fill" id="confidenceBar"></div>
                        </div>
                    </div>
                </div>

                <div class="remedies-container" id="remediesContainer">
                    <!-- Dynamic rendering via JS will place remedy info here -->
                </div>
                
                <div class="actions-bottom">
                    <button class="btn-secondary btn-full" id="resetBtn">Analyze Another Plant</button>
                </div>
            </section>

        </main>
    </div>

    <!-- Error Toast Notification -->
    <div class="toast hidden" id="errorToast">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="errorToastMessage">An error occurred</span>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
